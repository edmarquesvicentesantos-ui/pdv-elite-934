<!DOCTYPE html>
<html lang="pt-BR">

<head>

  <meta charset="UTF-8">

  <meta name="viewport"
        content="width=device-width, initial-scale=1.0">

  <title>Clientes</title>

  <link rel="stylesheet" href="style.css">

</head>

<body>

  <header>

    <div class="logo">
      👥 Cadastro de Clientes
    </div>

    <div class="usuario">
      PDV Elite 934
    </div>

  </header>

  <nav>

    <button onclick="voltar()">
      ⬅ Voltar
    </button>

  </nav>

  <div class="container">

    <div class="produtos">

      <h2>Novo Cliente</h2>

      <br>

      <input
        type="text"
        id="nome"
        placeholder="Nome do Cliente"
        class="campo"
      >

      <br><br>

      <input
        type="text"
        id="telefone"
        placeholder="Telefone"
        class="campo"
      >

      <br><br>

      <input
        type="text"
        id="whatsapp"
        placeholder="WhatsApp"
        class="campo"
      >

      <br><br>

      <button
        class="produto"
        onclick="salvarCliente()"
      >

        💾 Salvar Cliente

      </button>

      <br><br>

      <div id="mensagem"></div>

    </div>

  </div>

  <script type="module">

    import { db } from "./firebase.js";

    import {

      collection,
      addDoc

    } from
    "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

    function voltar(){

      window.location.href = "index.html";

    }

    window.voltar = voltar;

    async function salvarCliente(){

      let nome =
        document.getElementById("nome").value;

      let telefone =
        document.getElementById("telefone").value;

      let whatsapp =
        document.getElementById("whatsapp").value;

      if(nome === ""){

        alert("Informe o nome do cliente");

        return;

      }

      try{

        await addDoc(collection(db, "clientes"), {

          nome: nome,
          telefone: telefone,
          whatsapp: whatsapp,
          criadoEm: new Date()

        });

        document
          .getElementById("mensagem")
          .innerHTML = `

            <div class="status">

              ✔ Cliente salvo no Firebase!

            </div>

          `;

        // limpa campos
        document.getElementById("nome").value = "";

        document.getElementById("telefone").value = "";

        document.getElementById("whatsapp").value = "";

      } catch(erro){

        console.log(erro);

        alert("Erro ao salvar cliente");

      }

    }

    ```html
<input
  type="text"
  id="cliente"
  class="campo"
  placeholder="Nome do Cliente"
  onkeyup="salvarCliente()"
/>
```


    window.salvarCliente = salvarCliente;

  </script>

</body>

</html>
