<!DOCTYPE html>
<html lang="pt-BR">

<head>

  <meta charset="UTF-8">

  <meta name="viewport"
        content="width=device-width, initial-scale=1.0">

  <title>Cozinha PDV Elite 934</title>

  <link rel="stylesheet" href="style.css">

</head>

<body>

  <header>

    <div class="logo">
      🍳 Painel Cozinha
    </div>

    <div class="usuario">
      Produção
    </div>

  </header>

  <nav>

    <button onclick="voltar()">
      ⬅ Voltar
    </button>

  </nav>

  <div class="container">

    <div class="produtos">

      <h2>Pedidos em Produção</h2>

      <br>

      <table>

        <thead>

          <tr>

            <th>Mesa</th>
            <th>Pedido</th>
            <th>Status</th>
            <th>Ação</th>

          </tr>

        </thead>

        <tbody id="pedidosCozinha">

        </tbody>

      </table>

    </div>

  </div>

  <script>

    function voltar(){

      window.location.href =
      "https://edmarquesvicentesantos-ui.github.io/pdv-elite-934/";

    }

    let pedidos =
      JSON.parse(
        localStorage.getItem("pedidosCozinha")
      ) || [

        {
          mesa: "01",
          pedido: "🍟 Porção Batata",
          status: "Preparando"
        },

        {
          mesa: "02",
          pedido: "🍢 Espetinho",
          status: "Fila"
        }

      ];

    function carregarPedidos(){

      let tabela =
        document.getElementById(
          "pedidosCozinha"
        );

      tabela.innerHTML = "";

      pedidos.forEach((pedido, index) => {

        let linha =
          document.createElement("tr");

        linha.innerHTML = `

          <td>${pedido.mesa}</td>

          <td>${pedido.pedido}</td>

          <td>${pedido.status}</td>

          <td>

            <button
              class="produto"
              onclick="finalizarPedido(${index})"
            >

              ✔ Finalizar

            </button>

          </td>

        `;

        tabela.appendChild(linha);

      });

    }

    function finalizarPedido(index){

      pedidos[index].status =
        "✔ Pronto";

      localStorage.setItem(
        "pedidosCozinha",
        JSON.stringify(pedidos)
      );

      carregarPedidos();

    }

    carregarPedidos();

  </script>

</body>

</html>
