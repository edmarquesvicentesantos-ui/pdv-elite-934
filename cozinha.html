```html
<!DOCTYPE html>
<html lang="pt-BR">

<head>

<meta charset="UTF-8">

<meta name="viewport"
content="width=device-width, initial-scale=1.0">

<title>Cozinha PDV</title>

<link rel="stylesheet"
href="style.css">

</head>

<body>

<header>

<div class="logo">
🍳 Cozinha PDV Elite 934
</div>

</header>

<nav>

<button onclick="voltar()">
⬅ Voltar
</button>

</nav>

<div class="container">

<div class="produtos">

<h2>
📋 Pedidos da Cozinha
</h2>

<br>

<div id="listaPedidos">

</div>

</div>

</div>

<script>

function voltar(){

window.location.href =
"index.html";

}

function carregarPedidos(){

let pedidos =

JSON.parse(
localStorage.getItem(
"itensMesa"
)
) || [];

let cliente =

localStorage.getItem(
"clienteMesa"
);

let lista =

document.getElementById(
"listaPedidos"
);

lista.innerHTML = "";

if(pedidos.length === 0){

lista.innerHTML = `

<div class="status">

🍳 Nenhum pedido na cozinha

</div>

`;

return;

}

pedidos.forEach((item,index)=>{

let card =
document.createElement("div");

card.className =
"mesa-info";

card.innerHTML = `

<h3>
🍽️ ${cliente || "Cliente"}
</h3>

<br>

<strong>
Produto:
</strong>

${item.nome}

<br><br>

<strong>
Quantidade:
</strong>

${item.qtd}

<br><br>

<button
class="produto"
onclick="finalizarItem(${index})"
>

✔ Finalizar

</button>

<hr>

`;

lista.appendChild(card);

});

}

function finalizarItem(index){

let pedidos =

JSON.parse(
localStorage.getItem(
"itensMesa"
)
) || [];

pedidos.splice(index,1);

localStorage.setItem(

"itensMesa",

JSON.stringify(pedidos)

);

carregarPedidos();

}

window.onload = function(){

carregarPedidos();

}

</script>

</body>

</html>
```
