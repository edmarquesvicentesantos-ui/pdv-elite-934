<!DOCTYPE html>
<html lang="pt-BR">

</head>

<body>

  <nav>

  </nav>

    <div class="produtos">

          </tr>

            <td>✔ Online</td>

          </tr>

          <tr>

            <td>Financeiro</td>
            <td>✔ Online</td>

          </tr>

        </tbody>

      </table>

  </div>

  <script>

    function voltar(){

      window.location.href =
      "https://edmarquesvicentesantos-ui.github.io/pdv-elite-934/";

    }

    function sincronizar(){

      document
        .getElementById("resultado")
        .innerHTML = `

          <div class="status">

            ☁️ Sincronização realizada com sucesso
