<!DOCTYPE html>
<html lang="pt-BR">

<head>

  <meta charset="UTF-8">

  <meta name="viewport"
        content="width=device-width, initial-scale=1.0">

  <title>Mesas</title>

  <link rel="stylesheet" href="style.css">

</head>

<body>

  <header>

    <div class="logo">
      🍽️ Controle de Mesas
    </div>

    <div class="usuario">
      PDV Elite 934
    </div>

  </header>

  <nav>

    <button onclick="voltar()">
      ⬅ Voltar
    </button>

  </nav>

  <div class="container">

    <div class="produtos">

      <h2>Abrir Nova Mesa</h2>

      <br>

      <input
        type="text"
        id="cliente"
        placeholder="Nome do Cliente"
        class="campo"
      >

      <br><br>

      <button
        class="produto"
        onclick="abrirMesa()"
      >

        ➕ Abrir Mesa

      </button>

      <br><br>

      <div id="mensagem"></div>

      <br>

      <h2>Mesas Abertas</h2>

      <br>

      <div id="listaMesas"></div>

    </div>

  </div>

  <script type="module">

    import { db } from "./firebase.js";

    import {

      collection,
      addDoc,
      getDocs,
      deleteDoc,
      doc,
      updateDoc

    } from
    "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

    function voltar(){

      window.location.href = "index.html";

    }

    window.voltar = voltar;

    async function abrirMesa(){

      let cliente =
        document.getElementById("cliente").value;

      if(cliente === ""){

        alert("Informe o nome do cliente");

        return;

      }

      try{

        await addDoc(collection(db, "mesas"), {

          cliente: cliente,

          status: "Aberta",

          total: 0,

          itens: [],

          criadaEm: new Date()

        });

        document
          .getElementById("mensagem")
          .innerHTML = `

            <div class="status">

              ✔ Mesa aberta com sucesso!

            </div>

          `;

        document
          .getElementById("cliente").value = "";

        carregarMesas();

      } catch(erro){

        console.log(erro);

        alert("Erro ao abrir mesa");

      }

    }

    window.abrirMesa = abrirMesa;

    async function carregarMesas(){

      let lista =
        document.getElementById("listaMesas");

      lista.innerHTML = "";

      const querySnapshot =
        await getDocs(collection(db, "mesas"));

      querySnapshot.forEach((docItem) => {

        let mesa = docItem.data();

        let itensHTML = "";

        if(mesa.itens){

          mesa.itens.forEach((item) => {

            itensHTML += `

              <tr>

                <td>${item.produto}</td>
                <td>${item.quantidade}</td>
                <td>R$ ${item.total}</td>

              </tr>

            `;

          });

        }

        lista.innerHTML += `

          <div class="mesa-info">

            <strong>Cliente:</strong>
            ${mesa.cliente}

            <br>

            <strong>Status:</strong>
            ${mesa.status}

            <br>

            <strong>Total:</strong>
            R$ ${mesa.total}

            <br><br>

            <input
              type="text"
              id="produto-${docItem.id}"
              placeholder="Produto"
              class="campo"
            >

            <br><br>

            <input
              type="number"
              id="quantidade-${docItem.id}"
              placeholder="Quantidade"
              class="campo"
            >

            <br><br>

            <input
              type="number"
              id="valor-${docItem.id}"
              placeholder="Valor"
              class="campo"
            >

            <br><br>

            <button
              class="abrir"
              onclick="adicionarProduto('${docItem.id}')"
            >

              ➕ Adicionar Produto

            </button>

            <br><br>

            <table>

              <tr>

                <th>Produto</th>
                <th>Qtd</th>
                <th>Total</th>

              </tr>

              ${itensHTML}

            </table>

            <br>

            <button
              class="fechar"
              onclick="fecharMesa('${docItem.id}')"
            >

              ❌ Fechar Mesa

            </button>

          </div>

          <br>

        `;

      });

    }

    async function adicionarProduto(id){

      let produto =
        document.getElementById(`produto-${id}`).value;

      let quantidade =
        Number(
          document.getElementById(`quantidade-${id}`).value
        );

      let valor =
        Number(
          document.getElementById(`valor-${id}`).value
        );

      if(produto === ""){

        alert("Informe o produto");

        return;

      }

      const querySnapshot =
        await getDocs(collection(db, "mesas"));

      querySnapshot.forEach(async (docItem) => {

        if(docItem.id === id){

          let mesa = docItem.data();

          let itens = mesa.itens || [];

          let totalItem =
            quantidade * valor;

          itens.push({

            produto: produto,
            quantidade: quantidade,
            valor: valor,
            total: totalItem

          });

          let novoTotal =
            Number(mesa.total) + totalItem;

          await updateDoc(doc(db, "mesas", id), {

            itens: itens,
            total: novoTotal

          });

          carregarMesas();

        }

      });

    }

    window.adicionarProduto = adicionarProduto;

    async function fecharMesa(id){

      if(confirm("Deseja fechar esta mesa?")){

        await deleteDoc(doc(db, "mesas", id));

        carregarMesas();

      }

    }

    window.fecharMesa = fecharMesa;

    carregarMesas();

  </script>

</body>

</html>
