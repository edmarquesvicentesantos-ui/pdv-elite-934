<!DOCTYPE html>
<html lang="pt-BR">

<head>

  <meta charset="UTF-8">

  <meta name="viewport"
        content="width=device-width, initial-scale=1.0">

  <title>Estoque</title>

  <link rel="stylesheet" href="style.css">

  <script type="module"
          src="firebase-config.js"></script>

</head>

<body>

  <header>

    <div class="logo">
      📦 Estoque
    </div>

  </header>

  <nav>

    <button onclick="voltar()">
      ⬅ Voltar
    </button>

  </nav>

  <div class="container">

    <div class="produtos">

      <h2>Controle de Estoque</h2>

      <br>

      <input
        type="text"
        id="produto"
        class="campo"
        placeholder="Nome do Produto"
      >

      <br><br>

      <input
        type="number"
        id="quantidade"
        class="campo"
        placeholder="Quantidade"
      >

      <br><br>

      <button
        class="produto"
        onclick="salvarProduto()"
      >

        💾 Salvar Produto

      </button>

      <br><br>

      <table>

        <thead>

          <tr>

            <th>Produto</th>
            <th>Quantidade</th>

          </tr>

        </thead>

        <tbody id="tabelaEstoque">

        </tbody>

      </table>

    </div>

  </div>

  <script>

    function voltar(){

      window.location.href =
      "index.html";

    }

    let estoque =
      JSON.parse(
        localStorage.getItem(
          "estoqueProdutos"
        )
      ) || [];

    function carregarEstoque(){

      let tabela =
        document.getElementById(
          "tabelaEstoque"
        );

      tabela.innerHTML = "";

      estoque.forEach((item) => {

        let linha =
          document.createElement("tr");

        linha.innerHTML = `

          <td>${item.produto}</td>
          <td>${item.quantidade}</td>

        `;

        tabela.appendChild(linha);

      });

    }

    function salvarProduto(){

      let produto =
        document.getElementById(
          "produto"
        ).value;

      let quantidade =
        document.getElementById(
          "quantidade"
        ).value;

      if(
        produto == "" ||
        quantidade == ""
      ){

        return;

      }

      estoque.push({

        produto: produto,
        quantidade: quantidade

      });

      localStorage.setItem(

        "estoqueProdutos",

        JSON.stringify(estoque)

      );

      carregarEstoque();

      document.getElementById(
        "produto"
      ).value = "";

      document.getElementById(
        "quantidade"
      ).value = "";

    }

    carregarEstoque();

  </script>

</body>

</html>
