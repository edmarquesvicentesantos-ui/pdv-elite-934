<!DOCTYPE html>
<html lang="pt-BR">
<head>

  <link rel="stylesheet" href="style.css">
</head>

<body>

  <header>
    <div class="logo">🍺 PDV Elite 934</div>

      Operador: Edmarques | Caixa 01

    <button>👥 Clientes</button>

    <button>⚙️ Configurações</button>

  <div class="container">

    <div class="produtos">
      <h2>Produtos</h2>

      <div class="grid-produtos">

        <button class="produto">Heineken</button>
        <button class="produto">Skol</button>
        <button class="produto">Refrigerante</button>

    </div>

    <div class="comanda">

      <div class="mesa-info">
        <strong>Cliente:</strong> João Silva<br>
        <strong>Garçom:</strong> Carlos<br>
        <strong>Status:</strong> Mesa Aberta
      </div>

      <table>
        <thead>
          <tr>
            <th>Item</th>
            <th>Qtd</th>
            <th>Total</th>
          </tr>
        </thead>

        <tbody>
          <tr>
            <td>Heineken</td>
            <td>2</td>
            <td>R$ 24,00</td>
          </tr>

          <tr>
            <td>Espetinho</td>
            <td>3</td>
            <td>R$ 45,00</td>
          </tr>
        </tbody>
      </table>

      <div class="total">
        Total: R$ 69,00
      </div>

      <div class="acoes">
        <button class="abrir">➕ Abrir Mesa</button>
        <button class="dividir">💳 Dividir Conta</button>
        <button class="fechar">🔒 Fechar Mesa</button>
      </div>

      <div class="status">
        ✔ Mesa só poderá ser fechada após pagamento total.
      </div>

    </div>

  </div>

  <script src="script.js"></script>

</html>
