<!DOCTYPE html>
<html lang="pt-BR">

<head>

  <meta charset="UTF-8">

  <meta name="viewport"
        content="width=device-width, initial-scale=1.0">

  <title>PDV Elite 934</title>

  <link rel="stylesheet" href="style.css">

</head>

<body>

  <header>

    <div class="logo">
      🍺 PDV Elite 934
    </div>

    <div class="usuario">
      Operador: Edmarques | Caixa 01
    </div>

  </header>

  <nav>

    <button onclick="abrirPagina('clientes.html')">
      👥 Clientes
    </button>

    <button onclick="abrirPagina('produtos.html')">
      🍺 Produtos
    </button>

    <button onclick="abrirPagina('financeiro.html')">
      💰 Financeiro
    </button>

    <button onclick="abrirPagina('mesas.html')">
      🍽️ Mesas
    </button>

    <button onclick="abrirPagina('estoque.html')">
      📦 Estoque
    </button>

    <button onclick="abrirPagina('xml.html')">
      📄 XML
    </button>

    <button onclick="abrirPagina('relatorios.html')">
      📊 Relatórios
    </button>

    <button onclick="abrirPagina('configuracoes.html')">
      ⚙️ Configurações
    </button>

  </nav>

  <div class="container">

    <div class="produtos">

      <h2>Produtos</h2>

      <div class="grid-produtos">

        <button
          class="produto"
          onclick="adicionarProduto('Amstel', 10)"
        >
          🍺 Amstel
        </button>

        <button
          class="produto"
          onclick="adicionarProduto('Heineken', 12)"
        >
          🍺 Heineken
        </button>

        <button
          class="produto"
          onclick="adicionarProduto('Skol', 8)"
        >
          🍺 Skol
        </button>

        <button
          class="produto"
          onclick="adicionarProduto('Refrigerante', 6)"
        >
          🥤 Refrigerante
        </button>

        <button
          class="produto"
          onclick="adicionarProduto('Água', 4)"
        >
          💧 Água
        </button>

        <button
          class="produto"
          onclick="adicionarProduto('Whisky', 25)"
        >
          🥃 Whisky
        </button>

        <button
          class="produto"
          onclick="adicionarProduto('Porção', 35)"
        >
          🍟 Porção
        </button>

        <button
          class="produto"
          onclick="adicionarProduto('Espetinho', 15)"
        >
          🍢 Espetinho
        </button>

      </div>

    </div>

    <div class="comanda">

      <h2>
        🍽️ Mesa 01
      </h2>

      <div class="mesa-info">

        <strong>Cliente:</strong>
        João Silva

        <br>

        <strong>Garçom:</strong>
        Carlos

        <br>

        <strong>Status:</strong>
        Mesa Aberta

      </div>

      <table>

        <thead>

          <tr>

            <th>Item</th>
            <th>Qtd</th>
            <th>Total</th>

          </tr>

        </thead>

        <tbody id="itensMesa">

          <tr>

            <td>Heineken</td>
            <td>2</td>
            <td>R$ 24,00</td>

          </tr>

          <tr>

            <td>Espetinho</td>
            <td>3</td>
            <td>R$ 45,00</td>

          </tr>

        </tbody>

      </table>

      <div class="total" id="totalMesa">
        Total: R$ 69,00
      </div>

      <div class="acoes">

        <button class="abrir">
          ➕ Abrir Mesa
        </button>

        <button class="dividir">
          💳 Dividir Conta
        </button>

        <button class="fechar">
          🔒 Fechar Mesa
        </button>

      </div>

      <div class="status">
        ✔ Mesa só poderá ser fechada após pagamento total.
      </div>

    </div>

  </div>

  <script>

    function abrirPagina(pagina){

      window.location.href = pagina;

    }

    let total = 69;

    function adicionarProduto(nome, valor){

      let tabela =
        document.getElementById("itensMesa");

      let linha =
        document.createElement("tr");

      linha.innerHTML = `

        <td>${nome}</td>
        <td>1</td>
        <td>R$ ${valor},00</td>

      `;

      tabela.appendChild(linha);

      total += valor;

      document
        .getElementById("totalMesa")
        .innerHTML =
        `Total: R$ ${total},00`;

    }

  </script>

</body>

</html>
