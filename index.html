<!DOCTYPE html>
<html lang="pt-BR">

<head>

  <meta charset="UTF-8">

  <meta name="viewport"
        content="width=device-width, initial-scale=1.0">

  <title>Caixa PDV Elite 934</title>

  <link rel="stylesheet" href="style.css">

</head>

<body>

  <header>

    <div class="logo">
      💰 Caixa PDV Elite 934
    </div>

    <div class="usuario">
      Operador: Edmarques
    </div>

  </header>

  <nav>

    <button onclick="voltar()">
      ⬅ Voltar
    </button>

  </nav>

  <div class="container">

    <div class="produtos">

      <h2>Fechamento da Conta</h2>

      <br>

      <div class="mesa-info">

        <strong>Mesa:</strong> 01

        <br>

        <strong>Cliente:</strong> João Silva

        <br>

        <strong>Total:</strong>

        <span id="valorTotal">
          R$ 121,00
        </span>

      </div>

      <br>

      <h3>Forma de Pagamento</h3>

      <br>

      <div class="grid-produtos">

        <button
          class="produto"
          onclick="pagar('Dinheiro')"
        >

          💵 Dinheiro

        </button>

        <button
          class="produto"
          onclick="pagar('PIX')"
        >

          📱 PIX

        </button>

        <button
          class="produto"
          onclick="pagar('Cartão')"
        >

          💳 Cartão

        </button>

      </div>

      <br><br>

      <button onclick="abrirPagina('dashboard.html')">
  📊 Dashboard
</button>
      <div id="resultado"></div>

      <br>

      <table>

        <thead>

          <tr>

            <th>Pagamento</th>
            <th>Status</th>

          </tr>

        </thead>

        <tbody id="historico">

        </tbody>

      </table>

    </div>

  </div>

  <script>

    function voltar(){

      window.location.href = "index.html";

    }

    function pagar(tipo){

      document
        .getElementById("resultado")
        .innerHTML = `

          <div class="status">

            ✔ Pagamento realizado via ${tipo}

            <br><br>

            ✔ Mesa fechada com sucesso

          </div>

        `;

      let historico =
        document.getElementById("historico");

      let linha =
        document.createElement("tr");

      linha.innerHTML = `

        <td>${tipo}</td>
        <td>Pago</td>

      `;

      historico.appendChild(linha);

    }
<script>

let total = 69;

let itensMesa = [];

function abrirPagina(pagina){

  window.location.href = pagina;

}

function adicionarProduto(nome, valor){

  let tabela =
    document.getElementById("itensMesa");

  let linha =
    document.createElement("tr");

  linha.innerHTML = `

    <td>${nome}</td>
    <td>1</td>
    <td>R$ ${valor},00</td>

  `;

  tabela.appendChild(linha);

  total += valor;

  document
    .getElementById("totalMesa")
    .innerHTML =
    `Total: R$ ${total},00`;

  itensMesa.push({

    nome: nome,
    qtd: 1,
    total: valor

  });

}

function irCaixa(){

  localStorage.setItem(
    "totalMesa",
    total
  );

  localStorage.setItem(
    "itensMesa",
    JSON.stringify(itensMesa)
  );

  window.location.href =
  "https://edmarquesvicentesantos-ui.github.io/pdv-elite-934/caixa.html";

}

</script>
  </script>

</body>

</html>
