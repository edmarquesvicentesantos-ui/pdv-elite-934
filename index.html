<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<title>PDV Boteco</title>
<link rel="stylesheet" href="style.css">
</head>

<body>

<!-- MENU SUPERIOR -->
<div class="topo">
    <button onclick="alert('Cadastro de Clientes em breve')">Clientes</button>
    <button onclick="alert('Controle de Mesas em breve')">Mesas</button>
    <button onclick="alert('Cadastro de Produtos em breve')">Produtos</button>
    <button onclick="alert('Financeiro em breve')">Financeiro</button>
</div>

<div class="container">

    <!-- PRODUTOS -->
    <div class="produtos">
        <h2>Produtos</h2>
        <button onclick="adicionarProduto('Amstel',5)">🍺 Amstel</button>
        <button onclick="adicionarProduto('Heineken',7)">🍺 Heineken</button>
        <button onclick="adicionarProduto('Skol',4)">🍺 Skol</button>
        <button onclick="adicionarProduto('Refrigerante',5)">🥤 Refri</button>
        <button onclick="adicionarProduto('Água',3)">💧 Água</button>
    </div>

    <!-- CUPOM -->
    <div class="ticket">
        <h2>CUPOM</h2>
        <div id="listaCupom"></div>

        <h3>Total: <span id="total">R$ 0.00</span></h3>

        <div class="pagamentos">
            <button onclick="pagar('Dinheiro')">💵 Dinheiro</button>
            <button onclick="pagar('Pix')">📲 Pix</button>
            <button onclick="pagar('Débito')">💳 Débito</button>
            <button onclick="pagar('Crédito')">💳 Crédito</button>
            <button onclick="pendurar()">🧾 Pendura</button>
        </div>
    </div>

</div>

<script src="app.js"></script>
</body>
</html>
