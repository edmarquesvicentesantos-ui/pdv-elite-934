<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<title>PDV Boteco 934</title>
<link rel="stylesheet" href="style.css">
</head>
<body>

<nav>
  🍺 PDV Boteco 934
</nav>

<div class="container-principal">

  <!-- PRODUTOS -->
  <div class="lado-mesas">
    <h2>Produtos</h2>

    <button class="btn-add" onclick="adicionarProduto('Amstel',5)">Amstel</button>
    <button class="btn-add" onclick="adicionarProduto('Heineken',7)">Heineken</button>
    <button class="btn-add" onclick="adicionarProduto('Skol',4)">Skol</button>
    <button class="btn-add" onclick="adicionarProduto('Refri',6)">Refri</button>
    <button class="btn-add" onclick="adicionarProduto('Água',3)">Água</button>

  </div>

  <!-- CUPOM -->
  <div class="lado-cupom">
    <div class="ticket">

      <div class="ticket-header">
        <h2>BOTECO 934</h2>
        Distribuidora & Restaurante<br>
        Petrolina - PE
      </div>

      <h3>Clientes da mesa</h3>
      <select id="lista-clientes"></select>
      <button onclick="adicionarClienteMesa()">+ Cliente</button>

      <table>
        <thead>
          <tr>
            <th>Item</th>
            <th>Qtd</th>
            <th>Total</th>
            <th></th>
          </tr>
        </thead>
        <tbody id="itens-cupom"></tbody>
      </table>

      <p>Subtotal: R$ <span id="subtotal">0.00</span></p>
      <p>Taxa 10%: R$ <span id="taxa">0.00</span></p>

      <h3>Total: R$ <span id="total-geral">0.00</span></h3>

      <button class="btn-add" onclick="dividirConta()">👥 Dividir Conta</button>
      <button class="btn-fechar" onclick="fecharMesa()">💰 Fechar Mesa</button>

    </div>
  </div>

</div>

<script src="app.js"></script>
</body>
</html>
