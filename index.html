<!DOCTYPE html>
<html lang="pt-BR">

<head>

<meta charset="UTF-8">

<meta name="viewport"
content="width=device-width, initial-scale=1.0">

<title>PDV Elite 934</title>

<link rel="stylesheet" href="style.css">

</head>

<body>

<header>

<div class="logo">
🍺 PDV Elite 934
</div>

<div class="usuario">
Operador: Edmarques
</div>

</header>

<nav>

<button onclick="abrirPagina('estoque.html')">
📦 Estoque
</button>

<button onclick="abrirPagina('caixa.html')">
💰 Caixa
</button>

</nav>

<div class="container">

<div class="produtos">

<h2>Produtos</h2>

<input
type="text"
id="cliente"
class="campo"
placeholder="Nome do Cliente"
/>

<br><br>

<div class="grid-produtos">

<button
class="produto"
onclick="adicionarProduto('Heineken',12)"
>

🍺 Heineken

</button>

<button
class="produto"
onclick="adicionarProduto('Amstel',10)"
>

🍺 Amstel

</button>

<button
class="produto"
onclick="adicionarProduto('Refrigerante',6)"
>

🥤 Refrigerante

</button>

<button
class="produto"
onclick="adicionarProduto('Porção',35)"
>

🍟 Porção

</button>

</div>

</div>

<div class="comanda">

<h2>
🍽️ Mesa 01
</h2>

<table>

<thead>

<tr>

<th>Produto</th>
<th>Qtd</th>
<th>Total</th>

</tr>

</thead>

<tbody id="itensMesa">

</tbody>

</table>

<div
class="total"
id="totalMesa"
>

Total: R$ 0,00

</div>

<br>

<button
class="fechar"
onclick="abrirCaixa()"
>

💰 Abrir Caixa

</button>

</div>

</div>

<script>

let total = 0;

let itensMesa = [];

function abrirPagina(pagina){

window.location.href = pagina;

}

function adicionarProduto(nome, valor){

let itemExistente =

itensMesa.find(
item => item.nome === nome
);

if(itemExistente){

itemExistente.qtd++;

itemExistente.total += valor;

}else{

itensMesa.push({

nome: nome,
qtd: 1,
total: valor

});

}

renderizarMesa();

salvarMesa();

}

function renderizarMesa(){

let tabela =

document.getElementById(
"itensMesa"
);

tabela.innerHTML = "";

total = 0;

itensMesa.forEach((item)=>{

total += item.total;

let linha =
document.createElement("tr");

linha.innerHTML = `

<td>${item.nome}</td>
<td>${item.qtd}</td>
<td>R$ ${item.total},00</td>

`;

tabela.appendChild(linha);

});

document
.getElementById("totalMesa")
.innerHTML =

`Total: R$ ${total},00`;

}

function salvarMesa(){

let cliente =

document.getElementById(
"cliente"
).value;

localStorage.setItem(
"clienteMesa",
cliente
);

localStorage.setItem(
"itensMesa",
JSON.stringify(itensMesa)
);

localStorage.setItem(
"totalMesa",
total
);

}

function abrirCaixa(){

salvarMesa();

window.location.href =
"caixa.html";

}

window.onload = function(){

let clienteSalvo =

localStorage.getItem(
"clienteMesa"
);

if(clienteSalvo){

document.getElementById(
"cliente"
).value = clienteSalvo;

}

itensMesa =

JSON.parse(
localStorage.getItem(
"itensMesa"
)
) || [];

renderizarMesa();

}

</script>

</body>

</html>
