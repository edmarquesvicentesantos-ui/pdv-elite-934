<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<title>PDV Boteco 934</title>
<link rel="stylesheet" href="style.css?v=2">
</head>

<body>

<!-- MENU -->
<div class="topo">
    <button>Mesas</button>
    <button>Clientes</button>
    <button>Produtos</button>
    <button>Financeiro</button>
</div>

<div class="container">

    <!-- PRODUTOS -->
    <div class="produtos">
        <h2>Produtos</h2>

        <button onclick="addItem('Amstel',5)">🍺 Amstel</button>
        <button onclick="addItem('Heineken',7)">🍺 Heineken</button>
        <button onclick="addItem('Skol',4)">🍺 Skol</button>
        <button onclick="addItem('Refrigerante',5)">🥤 Refri</button>
        <button onclick="addItem('Água',3)">💧 Água</button>
    </div>

    <!-- CUPOM -->
    <div class="ticket">
        <h2>BOTECO 934</h2>

        <div id="cupom"></div>

        <hr>
        <div id="total">Total: R$ 0.00</div>

        <div class="pagamentos">
            <button onclick="pagar('Pix')">PIX</button>
            <button onclick="pagar('Dinheiro')">Dinheiro</button>
            <button onclick="pagar('Débito')">Cartão Débito</button>
            <button onclick="pagar('Crédito')">Cartão Crédito</button>
            <button onclick="pendura()">Pendura</button>
        </div>
    </div>

</div>

<script src="app.js"></script>
</body>
</html>
