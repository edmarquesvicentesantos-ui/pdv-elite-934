<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PDV Elite - Boteco 934</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <nav class="no-print">
        <div class="logo">Elite 934</div>
        <ul class="menu-tabs">
            <li onclick="window.switchTab('mesas')" id="tab-mesas" class="active">Mesas</li>
            <li onclick="window.switchTab('estoque')" id="tab-estoque">Estoque</li>
            <li onclick="window.switchTab('boticario')" id="tab-boticario">Boticário</li>
            <li onclick="window.switchTab('dre')" id="tab-dre">DRE</li>
        </ul>
    </nav>

    <main id="main-content" class="no-print">
        <div id="view-mesas">
            <h2>Controle de Mesas</h2>
            <div class="grid-mesas" id="mesaGrid"></div>
        </div>
        </main>

    <div id="cupom" class="print-only">
        <div style="text-align:center">
            <strong>BOTECO & DISTRIBUIDORA 934</strong><br>
            Petrolina - PE
        </div>
        <hr>
        <div id="cupom-info"></div>
        <hr>
        <table id="cupom-itens" style="width:100%"></table>
        <hr>
        <div id="cupom-total" style="text-align:right; font-weight:bold"></div>
    </div>

    <script type="module" src="app.js"></script>
</body>
</html>
