<script>

let total = 0;

let itensMesa = [];

function abrirPagina(pagina){

  window.location.href = pagina;

}

function adicionarProduto(nome, valor){

  let tabela =
    document.getElementById("itensMesa");

  let itemExistente =
    itensMesa.find(
      item => item.nome === nome
    );

  if(itemExistente){

    itemExistente.qtd++;

    itemExistente.total += valor;

  } else {

    itensMesa.push({

      nome: nome,
      qtd: 1,
      total: valor

    });

  }

  tabela.innerHTML = "";

  itensMesa.forEach((item) => {

    let linha =
      document.createElement("tr");

    linha.innerHTML = `

      <td>${item.nome}</td>
      <td>${item.qtd}</td>
      <td>R$ ${item.total},00</td>

    `;

    tabela.appendChild(linha);

  });

  total += valor;

  document
    .getElementById("totalMesa")
    .innerHTML =
    `Total: R$ ${total},00`;

  localStorage.setItem(
    "itensMesa",
    JSON.stringify(itensMesa)
  );

  localStorage.setItem(
    "totalMesa",
    total
  );

  let clienteAtual =

    document.getElementById(
      "cliente"
    ).value;

  localStorage.setItem(
    "clienteMesa",
    clienteAtual
  );

}

function salvarCliente(){

  let cliente =

    document.getElementById(
      "cliente"
    ).value;

  localStorage.setItem(
    "clienteMesa",
    cliente
  );

}

function irCaixa(){

  let cliente =

    document.getElementById(
      "cliente"
    ).value;

  localStorage.setItem(
    "clienteMesa",
    cliente
  );

  localStorage.setItem(
    "totalMesa",
    total
  );

  localStorage.setItem(
    "itensMesa",
    JSON.stringify(itensMesa)
  );

  window.location.href =
  "caixa.html";

}

window.onload = function(){

  let clienteSalvo =

    localStorage.getItem(
      "clienteMesa"
    );

  if(clienteSalvo){

    document.getElementById(
      "cliente"
    ).value = clienteSalvo;

  }

  let itensSalvos =

    JSON.parse(
      localStorage.getItem(
        "itensMesa"
      )
    ) || [];

  let totalSalvo =

    Number(
      localStorage.getItem(
        "totalMesa"
      )
    ) || 0;

  itensMesa = itensSalvos;

  total = totalSalvo;

  let tabela =

    document.getElementById(
      "itensMesa"
    );

  tabela.innerHTML = "";

  itensMesa.forEach((item) => {

    let linha =
      document.createElement("tr");

    linha.innerHTML = `

      <td>${item.nome}</td>
      <td>${item.qtd}</td>
      <td>R$ ${item.total},00</td>

    `;

    tabela.appendChild(linha);

  });

  document
    .getElementById("totalMesa")
    .innerHTML =
    `Total: R$ ${total},00`;

}

</script>

</body>

</html>
