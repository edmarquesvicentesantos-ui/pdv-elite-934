<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<title>PDV Boteco 934</title>

<style>
body{
  font-family: Arial;
  background:#f4f6f9;
  margin:0;
}
.topo{
  background:#1f2d3d;
  color:#fff;
  padding:15px;
  font-size:22px;
}
.container{
  display:flex;
  padding:20px;
}
.produtos{
  width:65%;
}
.comanda{
  width:35%;
  background:#fff;
  padding:15px;
  border-radius:8px;
  box-shadow:0 0 10px #ccc;
}
.btn{
  background:#27ae60;
  border:none;
  padding:15px;
  color:#fff;
  margin:8px;
  border-radius:8px;
  font-size:18px;
  cursor:pointer;
}
.btn:hover{ background:#219150; }

.tabela{
  width:100%;
  margin-top:10px;
}
.tabela td{ padding:5px; }

.finalizar{
  width:100%;
  padding:15px;
  margin-top:10px;
  border:none;
  border-radius:8px;
  color:#fff;
  font-size:18px;
  cursor:pointer;
}
.fechar{ background:#e74c3c; }
.dividir{ background:#3498db; }
</style>

</head>
<body>

<div class="topo">🍺 PDV Boteco 934</div>

<div class="container">

<div class="produtos">
<h2>Produtos</h2>

<button class="btn" onclick="addItem('Amstel',6)">Amstel</button>
<button class="btn" onclick="addItem('Heineken',8)">Heineken</button>
<button class="btn" onclick="addItem('Skol',5)">Skol</button>
<button class="btn" onclick="addItem('Refri',4)">Refri</button>
<button class="btn" onclick="addItem('Água',3)">Água</button>

</div>

<div class="comanda">

<h3>Clientes da mesa</h3>
<input id="clienteNome" placeholder="Nome do cliente">
<button onclick="addCliente()">+ Cliente</button>

<select id="clientes"></select>

<table class="tabela" id="lista"></table>

<h3 id="total">Total: R$ 0</h3>

<button class="finalizar dividir" onclick="dividir()">Dividir Conta</button>
<button class="finalizar fechar" onclick="fechar()">Fechar Mesa</button>

</div>
</div>

<script src="script.js"></script>
</body>
</html>
