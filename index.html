  <div class="container">

    <div class="produtos">

      <h2>Produtos</h2>

      <div class="grid-produtos">

        <button
          class="produto"
    4      onclick="adicionarProduto('Amstel', 10)"
        >

        <button
          class="produto"
          onclick="adicionarProduto('Heineken', 12)"

          class="produto"

        </button>

        <button
          class="produto"
          onclick="adicionarProduto('Refrigerante', 6)"
        >

        </button>

        <button
          class="produto"
          onclick="adicionarProduto('Água', 4)"
        >
          💧 Água
        </button>

        <button
          class="produto"
          onclick="adicionarProduto('Whisky', 25)"
        >
          🥃 Whisky
        </button>

        <button
          class="produto"
          onclick="adicionarProduto('Porção', 35)"
        >
          🍟 Porção
        </button>

        <button
          class="produto"
          onclick="adicionarProduto('Espetinho', 15)"
        >
          🍢 Espetinho
        </button>

      </div>

    </div>

    <div class="comanda">

      <h2>
        🍽️ Mesa 01
      </h2>

      <div class="mesa-info">

        <strong>Cliente:</strong>
        João Silva

        <br>

        <strong>Garçom:</strong>
        Carlos

        <br>

        <strong>Status:</strong>
        Mesa Aberta

      </div>

      <table>

        <thead>

          <tr>

            <th>Item</th>
            <th>Qtd</th>
            <th>Total</th>

          </tr>

        </thead>

        <tbody id="itensMesa">

        </tbody>

      </table>

      <div class="total" id="totalMesa">
        Total: R$ 0,00
      </div>

      <div class="acoes">

        <button class="abrir">
          ➕ Abrir Mesa
        </button>

        <button class="dividir">
          💳 Dividir Conta
        </button>

        <button
          class="fechar"
          onclick="irCaixa()"
        >
          💰 Ir para Caixa
        </button>

      </div>

      <div class="status">
        ✔ Mesa só poderá ser fechada após pagamento total.
      </div>

    </div>

  </div>

  <script>

    let total = 0;

    let itensMesa = [];

    function abrirPagina(pagina){

      window.location.href = pagina;

    }

    function adicionarProduto(nome, valor){

      let tabela =
        document.getElementById("itensMesa");

      let itemExistente =
        itensMesa.find(
          item => item.nome === nome
        );

      if(itemExistente){

        itemExistente.qtd++;

        itemExistente.total += valor;

      } else {

        itensMesa.push({

          nome: nome,
          qtd: 1,
          total: valor

        });

      }

      tabela.innerHTML = "";

      itensMesa.forEach((item) => {

        let linha =
          document.createElement("tr");

        linha.innerHTML = `

          <td>${item.nome}</td>
          <td>${item.qtd}</td>
          <td>R$ ${item.total},00</td>

        `;

        tabela.appendChild(linha);

      });

      total += valor;

      document
        .getElementById("totalMesa")
        .innerHTML =
        `Total: R$ ${total},00`;

    }

    function irCaixa(){

      localStorage.setItem(
        "totalMesa",
        total
      );

      localStorage.setItem(
        "itensMesa",
        JSON.stringify(itensMesa)
      );

      window.location.href =
      "https://edmarquesvicentesantos-ui.github.io/pdv-elite-934/caixa.html";

    }

  </script>
