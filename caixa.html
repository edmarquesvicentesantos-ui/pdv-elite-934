```html
<script>

function voltar(){

  window.location.href =
  "index.html";

}

let total =
  localStorage.getItem("totalMesa");

let itens =
  JSON.parse(
    localStorage.getItem("itensMesa")
  ) || [];

let cliente =

  localStorage.getItem(
    "clienteMesa"
  );

if(cliente){

  document.getElementById(
    "clienteNome"
  ).innerHTML = cliente;

}

if(total){

  document
    .getElementById("valorTotal")
    .innerHTML =
    `R$ ${total},00`;

}

let tabela =
  document.getElementById("itensMesa");

itens.forEach((item) => {

  let linha =
    document.createElement("tr");

  linha.innerHTML = `

    <td>${item.nome}</td>
    <td>${item.qtd}</td>
    <td>R$ ${item.total},00</td>

  `;

  tabela.appendChild(linha);

});

function pagar(tipo){

  document
    .getElementById("resultado")
    .innerHTML = `

      <div class="status">

        ✔ Pagamento realizado via ${tipo}

        <br><br>

        ✔ Mesa fechada com sucesso

      </div>

    `;

  localStorage.removeItem(
    "itensMesa"
  );

  localStorage.removeItem(
    "totalMesa"
  );

  localStorage.removeItem(
    "clienteMesa"
  );

}
</script>
```
