<!DOCTYPE html>
<html lang="pt-BR">

<head>

<meta charset="UTF-8">

<meta name="viewport"
content="width=device-width, initial-scale=1.0">

<title>Caixa</title>

<link rel="stylesheet"
href="style.css">

</head>

<body>

<header>

<div class="logo">
💰 Caixa
</div>

</header>

<nav>

<button onclick="voltar()">
⬅ Voltar
</button>

</nav>

<div class="container">

<div class="produtos">

<h2>Fechamento</h2>

<br>

<strong>Cliente:</strong>

<span id="clienteNome">
-
</span>

<br><br>

<strong>Total:</strong>

<span id="valorTotal">
R$ 0,00
</span>

<br><br>

<table>

<thead>

<tr>

<th>Produto</th>
<th>Qtd</th>
<th>Total</th>

</tr>

</thead>

<tbody id="itensMesa">

</tbody>

</table>

<br>

<div class="grid-produtos">

<button
class="produto"
onclick="pagar('PIX')"
>

📱 PIX

</button>

<button
class="produto"
onclick="pagar('Dinheiro')"
>

💵 Dinheiro

</button>

<button
class="produto"
onclick="pagar('Cartão')"
>

💳 Cartão

</button>

<button
class="produto"
onclick="pendurarConta()"
>

📝 Pendurar

</button>

<button
class="produto"
onclick="dividirConta()"
>

👥 Dividir Conta

</button>

</div>

💵 Dinheiro

</button>

<br><br>

<h3>Pagamento Misto</h3>

<input
type="number"
id="valorPix"
class="campo"
placeholder="Valor PIX"
/>

<br><br>

<input
type="number"
id="valorCartao"
class="campo"
placeholder="Valor Cartão"
/>

<br><br>

<input
type="number"
id="valorDinheiro"
class="campo"
placeholder="Valor Dinheiro"
/>

<br><br>

<button
class="produto"
onclick="fecharPagamentoMisto()"
>

✅ Finalizar Pagamento

</button>

<br><br>

</div>

</div>

<script>

function voltar(){

window.location.href =
"index.html";

}

let cliente =

localStorage.getItem(
"clienteMesa"
);

let total =

localStorage.getItem(
"totalMesa"
);

let itens =

JSON.parse(
localStorage.getItem(
"itensMesa"
)
) || [];

if(cliente){

document.getElementById(
"clienteNome"
).innerHTML = cliente;

}

if(total){

document.getElementById(
"valorTotal"
).innerHTML =
`R$ ${total},00`;

}

let tabela =

document.getElementById(
"itensMesa"
);

itens.forEach((item)=>{

let linha =
document.createElement("tr");

linha.innerHTML = `

<td>${item.nome}</td>
<td>${item.qtd}</td>
<td>R$ ${item.total},00</td>

`;

tabela.appendChild(linha);

});

function pagar(tipo){

document
.getElementById("resultado")
.innerHTML = `

<div class="status">

✔ Pagamento realizado via ${tipo}

<br><br>

✔ Venda finalizada

</div>

`;

localStorage.removeItem(
"clienteMesa"
);

localStorage.removeItem(
"itensMesa"
);

localStorage.removeItem(
"totalMesa"
);

}
  function pendurarConta(){

  document
    .getElementById("resultado")
    .innerHTML = `

      <div class="status">

        📝 Conta pendurada
        com sucesso

      </div>

    `;

}

function dividirConta(){

  let pessoas = prompt(

    "Dividir para quantas pessoas?"

  );

  if(!pessoas){

    return;

  }

  let valorDividido =

    (Number(total) / Number(pessoas))
    .toFixed(2);

  document
    .getElementById("resultado")
    .innerHTML = `

      <div class="status">

        👥 Conta dividida
        para ${pessoas} pessoas

        <br><br>

        💰 Cada pessoa paga:

        R$ ${valorDividido}

      </div>

    `;

}

  function fecharPagamentoMisto(){

let pix =

Number(
document.getElementById(
"valorPix"
).value
) || 0;

let cartao =

Number(
document.getElementById(
"valorCartao"
).value
) || 0;

let dinheiro =

Number(
document.getElementById(
"valorDinheiro"
).value
) || 0;

let totalPago =

pix + cartao + dinheiro;

let restante =

Number(total) - totalPago;

if(restante > 0){

document
.getElementById("resultado")
.innerHTML = `

<div class="status">

⚠ Falta pagar:

R$ ${restante.toFixed(2)}

</div>

`;

return;

}

document
.getElementById("resultado")
.innerHTML = `

<div class="status">

✔ Pagamento concluído

<br><br>

📱 PIX:
R$ ${pix.toFixed(2)}

<br>

💳 Cartão:
R$ ${cartao.toFixed(2)}

<br>

💵 Dinheiro:
R$ ${dinheiro.toFixed(2)}

</div>

`;

localStorage.removeItem(
"clienteMesa"
);

localStorage.removeItem(
"itensMesa"
);

localStorage.removeItem(
"totalMesa"
);

}
</script>

</body>

</html>
